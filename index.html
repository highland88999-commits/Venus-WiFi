<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ARtemis_NAV // OMEGA_3.0 ⚡</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --bg-color: #0a0a14;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0; background-color: var(--bg-color);
            color: #ffffff; font-family: var(--terminal-font);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 2px; z-index: 1001; pointer-events: none;
        }

        header {
            background: #0d0d1a; border-bottom: 2px solid var(--neon-cyan);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan); z-index: 1002;
        }

        h1 { margin: 0; font-size: 1rem; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

        .nav-dash {
            display: flex; flex-direction: column; gap: 10px;
            padding: 15px; background: #121225; border-bottom: 1px solid #2a2a4a; z-index: 1002;
        }

        .search-bar { display: flex; gap: 8px; }

        input[type="text"] {
            flex-grow: 1; background: #07070f; border: 1px solid var(--neon-cyan);
            color: #fff; padding: 12px; font-family: var(--terminal-font);
            outline: none; box-shadow: inset 0 0 5px var(--neon-cyan);
        }

        .audio-trigger {
            background: transparent; border: 1px solid var(--neon-pink);
            color: var(--neon-pink); padding: 10px; cursor: pointer;
            box-shadow: 0 0 5px var(--neon-pink); font-size: 1.2rem;
        }

        .main-btn {
            background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 10px; cursor: pointer; font-family: var(--terminal-font);
            text-transform: uppercase; font-weight: bold; width: 100%;
        }

        #map { flex-grow: 1; z-index: 1000; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(110%); }
    </style>
</head>
<body>

    <header>
        <h1>[ARTEMIS] SYSTEM_CORE_v3</h1>
        <div id="sync-status" style="color: #39ff14; font-size: 0.8rem;">READY</div>
    </header>

    <div class="nav-dash">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="ENTER VECTOR...">
            <button class="audio-trigger" onclick="startVoicePrompt()">🎤</button>
            <button class="main-btn" style="width: auto;" onclick="searchVault()">SCAN</button>
        </div>
        <button class="main-btn" onclick="startGPS()">🛰️ ENGAGE GPS / POSITION LOCK</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        const map = L.map('map').setView([53.9171, -122.7497], 13); // Centered on Prince George
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let db, userMarker, destMarker, routingControl, userPos;

        // Initialize Vault
        const request = indexedDB.open("ArtemisVault", 1);
        request.onsuccess = (e) => { db = e.target.result; };

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0;
            window.speechSynthesis.speak(utter);
        }

        // Voice Input Implementation
        function startVoicePrompt() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            speak("System listening.");
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('search-input').value = transcript;
                searchVault();
            };
            recognition.start();
        }

        function searchVault() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            
            document.getElementById('sync-status').innerText = "SCANNING...";
            // Bypassing local vault if empty and going straight to global for your current area
            searchGlobalNetwork(query);
        }

        async function searchGlobalNetwork(query) {
            try {
                let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
                if (userPos) url += `&lat=${userPos.lat}&lon=${userPos.lon}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data && data.length > 0) {
                    const hit = data[0];
                    const lat = parseFloat(hit.lat);
                    const lon = parseFloat(hit.lon);
                    
                    renderMarker(lat, lon, query.toUpperCase());
                    speak(`Vector ${query} acquired.`);
                }
            } catch (err) {
                document.getElementById('sync-status').innerText = "OFFLINE ERROR";
            }
        }

        function renderMarker(lat, lon, label) {
            map.setView([lat, lon], 16);
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.circleMarker([lat, lon], { radius: 12, color: '#00f3ff', fillOpacity: 0.8 }).addTo(map)
                .bindPopup(`<b>${label}</b><br><button onclick="lockRoute(${lat}, ${lon})">LOCK ROUTE</button>`).openPopup();
        }

        function startGPS() {
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                if (!userMarker) {
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], { radius: 8, color: '#ff0055' }).addTo(map);
                } else userMarker.setLatLng([userPos.lat, userPos.lon]);
            }, null, { enableHighAccuracy: true });
            speak("GPS Link Established.");
        }

        function lockRoute(lat, lon) {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(userPos.lat, userPos.lon), L.latLng(lat, lon)],
                lineOptions: { styles: [{ color: '#00f3ff', weight: 6 }] },
                createMarker: () => null,
                addWaypoints: false,
                draggableWaypoints: false
            }).addTo(map);
            
            // "Route guidance active" instruction removed as requested.
            document.getElementById('sync-status').innerText = "ROUTE LOCKED";
        }
    </script>
</body>
</html>
