<!DOCTYPE html>
<html>
<head>
    <title>WiFi Scout - 20km Perimeter</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 80vh; border-radius: 12px; margin-top: 10px; }
        body { font-family: sans-serif; padding: 20px; background: #eceff1; }
        .stats { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <h2>📍 Nearby Free WiFi (20km Scan)</h2>
    <div class="stats">
        <span id="counter">0</span> spots found within 20km.
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([53.5461, -113.4937], 11); // Default to city center
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Your "Preloaded" Database (Store this in a separate .json file for production)
        const wifiDatabase = [
            { name: "McDonald's", brand: "McD", lat: 53.544, lon: -113.490, ssid: "McD_WiFi" },
            { name: "Tim Hortons", brand: "Timmies", lat: 53.548, lon: -113.500, ssid: "Tim_Hortons_WiFi" },
            { name: "Superstore", brand: "PC", lat: 53.560, lon: -113.520, ssid: "PC_Guest" },
            { name: "Home Depot", brand: "Retail", lat: 53.530, lon: -113.480, ssid: "HomeDepot_Guest" }
            // Add thousands more here...
        ];

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        navigator.geolocation.getCurrentPosition(pos => {
            const userLat = pos.coords.latitude;
            const userLon = pos.coords.longitude;
            
            // Add "You Are Here" Marker
            L.circle([userLat, userLon], { radius: 20000, color: 'blue', fillOpacity: 0.05 }).addTo(map);
            L.marker([userLat, userLon]).bindPopup("You are here").addTo(map);
            map.setView([userLat, userLon], 11);

            let count = 0;
            wifiDatabase.forEach(spot => {
                const dist = calculateDistance(userLat, userLon, spot.lat, spot.lon);
                if (dist <= 20) { // 20km Filter
                    L.marker([spot.lat, spot.lon])
                        .addTo(map)
                        .bindPopup(`<b>${spot.name}</b><br>SSID: ${spot.ssid}<br>${dist.toFixed(1)}km away`);
                    count++;
                }
            });
            document.getElementById('counter').innerText = count;
        });
    </script>
</body>
</html>
