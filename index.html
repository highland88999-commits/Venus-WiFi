<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER_NAV // YEG_SECTOR ⚡</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f3ff">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #0a0a14;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #b500ff;
            --neon-green: #39ff14;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--terminal-font);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1001; pointer-events: none;
        }

        header {
            background: #0d0d1a; border-bottom: 2px solid var(--neon-cyan);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan); z-index: 1002;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

        .nav-dash {
            display: flex; flex-direction: column; gap: 8px;
            padding: 10px 15px; background: #121225; border-bottom: 1px solid #2a2a4a; z-index: 1002;
        }

        .search-bar { display: flex; gap: 10px; }

        input[type="text"] {
            flex-grow: 1; background: #07070f; border: 1px solid var(--neon-cyan);
            color: #fff; padding: 10px; font-family: var(--terminal-font);
            box-shadow: inset 0 0 5px var(--neon-cyan);
        }

        .controls { display: flex; gap: 10px; }

        button {
            background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 10px; cursor: pointer; font-family: var(--terminal-font);
            text-transform: uppercase; font-weight: bold; transition: all 0.3s ease;
        }

        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        button.pink { color: var(--neon-pink); border-color: var(--neon-pink); }
        button.pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }

        #map { flex-grow: 1; z-index: 1000; }

        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%); }

        .leaflet-popup-content-wrapper {
            background: #0d0d1a; color: #fff; border: 1px solid var(--neon-purple);
            font-family: var(--terminal-font); box-shadow: 0 0 10px var(--neon-purple);
        }
    </style>
</head>
<body>

    <header>
        <h1>[SYS_NAV] VECTOR_TRACKER // YEG</h1>
        <div id="sync-status" style="color: var(--neon-green); font-size: 0.8rem;">🛰️ STANDBY</div>
    </header>

    <div class="nav-dash">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="SEARCH OFFLINE CACHE (e.g., Walmart)...">
            <button onclick="searchOffline()">🔍 SCAN</button>
        </div>
        <div class="controls">
            <button class="pink" onclick="syncLocalData()">💾 SYNC</button>
            <button onclick="startNavScan()">📡 ENGAGE GPS</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([53.5461, -113.4937], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const yegDatabase = [
            { n: "EPL Stanley Milner", lat: 53.5435, lon: -113.4895, s: "EPL-Free-Wifi" },
            { n: "City Hall Hub", lat: 53.5453, lon: -113.4901, s: "Open City Wi-Fi" },
            { n: "McDonald's Jasper Ave", lat: 53.5415, lon: -113.4975, s: "BELLWIFI@MCD" },
            { n: "Southgate Shopping Hub", lat: 53.4851, lon: -113.5144, s: "#TELUS" },
            { n: "Walmart South Common", lat: 53.4475, lon: -113.4792, s: "Walmart_WiFi" },
            { n: "Superstore Calgary Trail", lat: 53.4882, lon: -113.4938, s: "PC_Guest" },
            { n: "West Edmonton Mall", lat: 53.5225, lon: -113.6242, s: "WEM-Guest" },
            { n: "Kingsway Mall", lat: 53.5555, lon: -113.5012, s: "Kingsway_Guest" }
        ];

        let userMarker = null;
        let activeRouteLine = null;
        let activeTarget = null;
        let userPos = null;

        // Voice Alert Flags (Prevent spamming the same warning)
        let alertsSpoken = { '3km': false, '1km': false, '500ft': false, '100ft': false, 'arrived': false };

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0;
            utter.pitch = 0.8; // Deep cyberpunk robotic voice
            synth.speak(utter);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Earth radius in meters
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function searchOffline() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const results = yegDatabase.filter(spot => spot.n.toLowerCase().includes(query));

            if(results.length > 0) {
                const bestMatch = results[0];
                map.setView([bestMatch.lat, bestMatch.lon], 15);
                L.popup().setLatLng([bestMatch.lat, bestMatch.lon])
                    .setContent(`<b>MATCH FOUND:</b> ${bestMatch.n}<br><button onclick="setDestination(${bestMatch.lat}, ${bestMatch.lon}, '${bestMatch.n}')">🛣️ LOCK ROUTE</button>`)
                    .openOn(map);
            } else {
                speak("No offline database matches found.");
            }
        }

        function setDestination(lat, lon, name) {
            activeTarget = { lat, lon, name };
            alertsSpoken = { '3km': false, '1km': false, '500ft': false, '100ft': false, 'arrived': false };
            speak(`Destination locked: ${name}. Proceed towards vector.`);
            updateNavigation();
        }

        function startNavScan() {
            speak("Engaging satellite tracking.");
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                
                if (!userMarker) {
                    // PURPLE USER MARKER
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], {
                        radius: 8, color: '#b500ff', fillColor: '#b500ff', fillOpacity: 0.8
                    }).addTo(map).bindPopup("YOU (CYBER_USER)");
                } else {
                    userMarker.setLatLng([userPos.lat, userPos.lon]);
                }
                
                map.setView([userPos.lat, userPos.lon]);
                updateNavigation();
            }, err => alert("GPS Jammed or Permission Denied."), { enableHighAccuracy: true });
        }

        function updateNavigation() {
            if (!userPos || !activeTarget) return;

            // Draw Neon Cyber-Route line
            if (activeRouteLine) map.removeLayer(activeRouteLine);
            activeRouteLine = L.polyline([
                [userPos.lat, userPos.lon], 
                [activeTarget.lat, activeTarget.lon]
            ], { color: '#00f3ff', weight: 4, opacity: 0.8, dashArray: '5, 10' }).addTo(map);

            const distanceMeters = getDistance(userPos.lat, userPos.lon, activeTarget.lat, activeTarget.lon);
            const distanceFeet = distanceMeters * 3.28084;

            document.getElementById('sync-status').innerText = `TARGET: ${distanceMeters.toFixed(0)}m away`;

            // 📢 VOICE PROMPT LOGIC
            if (distanceMeters <= 3000 && distanceMeters > 1000 && !alertsSpoken['3km']) {
                speak("Three kilometers to destination."); alertsSpoken['3km'] = true;
            } 
            else if (distanceMeters <= 1000 && distanceMeters > 152 && !alertsSpoken['1km']) {
                speak("One kilometer warning."); alertsSpoken['1km'] = true;
            } 
            else if (distanceFeet <= 500 && distanceFeet > 100 && !alertsSpoken['500ft']) {
                speak("Five hundred feet warning."); alertsSpoken['500ft'] = true;
            } 
            else if (distanceFeet <= 100 && distanceFeet > 20 && !alertsSpoken['100ft']) {
                speak("One hundred feet warning. Arriving shortly."); alertsSpoken['100ft'] = true;
            } 
            else if (distanceMeters <= 20 && !alertsSpoken['arrived']) {
                speak("You have arrived at your destination node."); alertsSpoken['arrived'] = true;
                if (activeRouteLine) map.removeLayer(activeRouteLine);
                activeTarget = null;
            }
        }

        function syncLocalData() {
            localStorage.setItem('YEG_WIFI_CHUNKS', JSON.stringify(yegDatabase));
            document.getElementById('sync-status').innerText = "⚡ CACHE LOADED (STABLE)";
            speak("Database synchronization complete.");
        }
    </script>
</body>
</html>
