<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ARtemis_NAV // OMEGA_3.0 ⚡</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f3ff">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0a14;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #b500ff;
            --neon-green: #39ff14;
            --neon-yellow: #ffff00;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--terminal-font);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1001; pointer-events: none;
        }

        header {
            background: #0d0d1a; border-bottom: 2px solid var(--neon-cyan);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan); z-index: 1002;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

        .nav-dash {
            display: flex; flex-direction: column; gap: 8px;
            padding: 10px 15px; background: #121225; border-bottom: 1px solid #2a2a4a; z-index: 1002;
        }

        .search-bar { display: flex; gap: 10px; }

        input[type="text"] {
            flex-grow: 1; background: #07070f; border: 1px solid var(--neon-cyan);
            color: #fff; padding: 10px; font-family: var(--terminal-font);
            box-shadow: inset 0 0 5px var(--neon-cyan); outline: none;
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 8px; cursor: pointer; font-family: var(--terminal-font);
            text-transform: uppercase; font-weight: bold; transition: all 0.3s ease; font-size: 0.8rem;
            flex-grow: 1; text-align: center;
        }

        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        button.pink { color: var(--neon-pink); border-color: var(--neon-pink); }
        button.pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }
        button.purple { color: var(--neon-purple); border-color: var(--neon-purple); }
        button.purple:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }
        button.green { color: var(--neon-green); border-color: var(--neon-green); }
        button.green:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        button.weather { color: var(--neon-yellow); border-color: var(--neon-yellow); }
        button.weather:hover { background: var(--neon-yellow); color: #000; box-shadow: 0 0 15px var(--neon-yellow); }
        button.nearby { color: #39ff14; border-color: #39ff14; }
        button.nearby:hover { background: #39ff14; color: #000; box-shadow: 0 0 15px #39ff14; }

        #progress-bar {
            height: 4px; background: var(--neon-pink); width: 0%;
            transition: width 0.3s; box-shadow: 0 0 10px var(--neon-pink); z-index: 1002;
        }

        #weather-panel {
            position: absolute; top: 75px; right: 15px; z-index: 1003;
            background: rgba(13, 13, 26, 0.97); border: 2px solid var(--neon-cyan);
            padding: 12px; width: 290px; max-height: 65vh; overflow-y: auto;
            font-size: 0.75rem; box-shadow: 0 0 20px var(--neon-cyan);
            border-radius: 4px; display: none; flex-direction: column; gap: 8px;
        }

        .weather-header {
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 8px; border-bottom: 1px dashed #444;
        }

        .section { margin-bottom: 8px; }
        .hourly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 6px; }
        .hourly-item { 
            background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-cyan); 
            padding: 6px; text-align: center; border-radius: 4px; box-shadow: inset 0 0 5px rgba(0, 243, 255, 0.2);
        }

        #map { flex-grow: 1; z-index: 1000; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%); }

        .leaflet-popup-content-wrapper {
            background: #0d0d1a; color: #fff; border: 1px solid var(--neon-cyan);
            font-family: var(--terminal-font); box-shadow: 0 0 10px var(--neon-cyan);
        }

        #speed-limit {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 2px solid var(--neon-yellow);
            padding: 8px 18px; font-size: 1.2rem; font-weight: bold; z-index: 1004;
            border-radius: 4px; display: none; text-align: center;
        }

        #lane-assist {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 2px solid #39ff14;
            padding: 6px 14px; font-size: 1rem; font-weight: bold; z-index: 1004;
            border-radius: 4px; display: none; white-space: nowrap;
        }

        #traffic-alert {
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 165, 0, 0.95); color: #000; padding: 6px 14px;
            font-size: 0.95rem; font-weight: bold; z-index: 1004;
            border-radius: 4px; display: none; white-space: nowrap;
        }

        /* Added specific icon styling for WiFi nodes */
        .wifi-icon { font-size: 1.2rem; text-shadow: 0 0 10px var(--neon-purple); text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>[ARTEMIS] SYSTEM_CORE_v3</h1>
        <div id="sync-status" style="color: var(--neon-green); font-size: 0.8rem;">🛰️ STANDBY</div>
    </header>

    <div id="progress-bar"></div>

    <div class="nav-dash">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="SEARCH OFFLINE VAULT...">
            <button onclick="searchVault()">🔍 SCAN</button>
        </div>
        <div class="controls">
            <button class="pink" onclick="syncDropboxVault()">📡 DL DROPBOX VAULT</button>
            <button class="green" onclick="syncEdmontonOpenData()">🌐 BUSINESS OPEN DATA</button>
            <button class="purple" onclick="syncResidentialParcels()">🏠 RESIDENTIAL PARCELS (FULL)</button>
            <button class="nearby" onclick="loadNearbyAddresses(30)">📍 LOAD NEARBY (30 km)</button>
            <button class="purple" onclick="clearVaultAndRetry()">🔄 CLEAR VAULT & RETRY FULL</button>
            <button class="weather" onclick="fetchWeatherData()">☀️ METEO + AQI + HOURLY</button>
            <button class="purple" onclick="syncWifiNodes()">📶 PING ALL OPEN WIFI</button>
            <button onclick="startGPS()">🛰️ ENGAGE GPS</button>
        </div>
    </div>

    <div id="weather-panel">
        <div class="weather-header" onclick="toggleWeatherPanel()">
            <span style="color:#ffff00; font-weight:bold;">[ METEO / AQI CORE ]</span>
            <span id="weather-toggle-icon" style="color:#00f3ff;">▼</span>
        </div>
        <div id="weather-content" style="display:none;">
            <div id="weather-current" class="section"></div>
            <div id="weather-hourly" class="section">
                <div style="color:#00f3ff; margin-bottom:4px;">NEXT 8 HOURS</div>
                <div id="hourly-grid" class="hourly-grid"></div>
            </div>
            <div id="weather-aqi" class="section">
                <div style="color:#ffff00; margin-bottom:4px;">AIR QUALITY INDEX</div>
                <div id="aqi-content"></div>
            </div>
        </div>
    </div>

    <div id="speed-limit">SPEED LIMIT: <span id="current-speed-limit">—</span> km/h</div>
    <div id="lane-assist">LANE: <span id="recommended-lane">—</span></div>
    <div id="traffic-alert"></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        const map = L.map('map').setView([53.5461, -113.4937], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let db;
        let userMarker = null;
        let destMarker = null; 
        let manualMarker = null;
        let routingControl = null;
        let activeTarget = null;
        let userPos = null;
        let routeWatchId = null; 
        let wifiLayer = L.layerGroup().addTo(map);
        let currentRouteSteps = [];
        let lastSpoken = {};

        // ==================== TACTICAL MAP DROP ====================
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;

            if (manualMarker) map.removeLayer(manualMarker);

            manualMarker = L.circleMarker([lat, lon], {
                radius: 12, color: '#ffaa00', fillColor: '#ffaa00', fillOpacity: 0.3, weight: 2, dashArray: '4, 4'
            }).addTo(map);

            const holoframe = `
                <div style="text-align:center; font-family: var(--terminal-font); border: 1px solid #ffaa00; padding: 8px; background: rgba(20, 15, 0, 0.9); box-shadow: inset 0 0 10px rgba(255, 170, 0, 0.5);">
                    <b style="color:#ffaa00; text-shadow: 0 0 5px #ffaa00;">[ TACTICAL DROP ]</b><br>
                    <span style="font-size: 0.65rem; color: #aaa;">LAT: ${lat.toFixed(5)} <br> LON: ${lon.toFixed(5)}</span><br><br>
                    <button style="border-color: #ffaa00; color: #ffaa00; width: 100%; box-shadow: 0 0 5px #ffaa00;" 
                            onmouseover="this.style.background='#ffaa00'; this.style.color='#000'" 
                            onmouseout="this.style.background='transparent'; this.style.color='#ffaa00'" 
                            onclick="lockRoute(${lat}, ${lon}, 'TACTICAL WAYPOINT'); map.closePopup();">
                        ▶ START
                    </button>
                </div>
            `;

            manualMarker.bindPopup(holoframe, { closeButton: false, minWidth: 140 }).openPopup();
            speak("Tactical coordinates acquired.");
        });

        // ==================== PRELOADED STORES ====================
        const preloadedRetailNodes = [
            { name: "FreshCo Manning Village: 398 Ebbers Blvd NW", type: "GROCERY" },
            { name: "FreshCo Palisades Square: 12950 - 137 Avenue NW", type: "GROCERY" },
            { name: "Costco Wholesale: 12450 149 St NW", type: "GROCERY" },
            { name: "Shoppers Drug Mart Whyte Ave: 10907 82nd Avenue NW", type: "PHARMACY" },
            { name: "Shoppers Drug Mart Mill Woods: 2331 66th St NW, Unit 417", type: "PHARMACY" },
            { name: "Rexall Kaye Edmonton Clinic: 11400 University Avenue NW", type: "PHARMACY" },
            { name: "PetSmart NW Edmonton: 13916 - 137 Ave", type: "SPECIALTY" },
            { name: "Bone & Biscuit 50th Street Market: 4937-167th Avenue NW", type: "SPECIALTY" },
            { name: "Michaels West Edmonton: 9718 170th St NW", type: "SPECIALTY" }
        ];

        const wifiDatabase = [
            { n: "McDonald's Jasper Ave", brand: "McD", lat: 53.5415, lon: -113.4975, ssid: "McD_WiFi" },
            { n: "Starbucks City Centre", brand: "Coffee", lat: 53.5448, lon: -113.4912, ssid: "Starbucks WiFi" },
            { n: "Tim Hortons Hub", brand: "Timmies", lat: 53.5480, lon: -113.5000, ssid: "Tim_Hortons_WiFi" },
            { n: "Edmonton Public Library - Main", lat: 53.5444, lon: -113.4903, ssid: "EPL_Free" }
        ];

        // ==================== INDEXEDDB SETUP ====================
        const request = indexedDB.open("ArtemisVault", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            const store = db.createObjectStore("addresses", { keyPath: "id", autoIncrement: true });
            store.createIndex("name", "name", { unique: false });
        };
        request.onsuccess = (e) => { 
            db = e.target.result; 
            checkVaultCount(); 
            loadPreloadedNodes();
        };

        function checkVaultCount() {
            const tx = db.transaction("addresses", "readonly");
            const countReq = tx.objectStore("addresses").count();
            countReq.onsuccess = () => {
                document.getElementById('sync-status').innerText = `VAULT: ${countReq.result} NODES`;
            };
        }

        function loadPreloadedNodes() {
            const tx = db.transaction("addresses", "readwrite");
            const store = tx.objectStore("addresses");
            preloadedRetailNodes.forEach((node) => {
                store.add({ name: node.name.toUpperCase(), lat: 53.5461, lon: -113.4937, type: node.type });
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.95; utter.pitch = 0.9;
            window.speechSynthesis.speak(utter);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function getColumnData(row, acceptableHeaders) {
            for (let key in row) {
                if (acceptableHeaders.includes(key.trim().toUpperCase())) return row[key];
            }
            return null;
        }

        async function addressExists(name) {
            return new Promise(resolve => {
                const tx = db.transaction("addresses", "readonly");
                const index = tx.objectStore("addresses").index("name");
                const req = index.get(name.toUpperCase());
                req.onsuccess = () => resolve(!!req.result);
            });
        }

        // ==================== SYNC FUNCTIONS (FIXED) ====================
        
        function syncDropboxVault() {
            speak("Dropbox sync sequence initiated.");
            document.getElementById('sync-status').innerText = "📡 DROPBOX SYNC PENDING (API REQUIRED)";
            // Placeholder: Wire up actual Dropbox API logic here
        }

        function syncEdmontonOpenData() {
            speak("Connecting to municipal business data.");
            document.getElementById('sync-status').innerText = "🌐 BIZ DATA PENDING (ENDPOINT NEEDED)";
            // Placeholder: Add your business dataset URL here
        }
        
        function syncWifiNodes() {
            speak("Pinging local WiFi nodes.");
            wifiLayer.clearLayers();
            wifiDatabase.forEach(node => {
                const marker = L.marker([node.lat, node.lon], {
                    icon: L.divIcon({ className: 'wifi-icon', html: '📶' })
                }).addTo(wifiLayer);
                
                marker.bindPopup(`
                    <div style="font-family: var(--terminal-font); text-align: center;">
                        <b style="color: var(--neon-purple);">${node.n}</b><br>
                        SSID: <span style="color: var(--neon-cyan);">${node.ssid}</span>
                    </div>
                `);
            });
            document.getElementById('sync-status').innerText = "✅ WIFI NODES MAPPED";
        }

        async function syncResidentialParcels() {
            speak("Initiating full residential parcel override. Standby.");
            document.getElementById('sync-status').innerText = "🏠 DOWNLOADING FULL RESIDENTIAL DB...";

            const RESIDENTIAL_URL = "https://data.edmonton.ca/api/views/ut27-nrpn/rows.csv?accessType=DOWNLOAD";
            let count = 0;

            Papa.parse(RESIDENTIAL_URL, {
                download: true, header: true, skipEmptyLines: true,
                chunk: async function(results) {
                    const tx = db.transaction("addresses", "readwrite");
                    const store = tx.objectStore("addresses");

                    for (let row of results.data) {
                        const rawAddr = row["ADDRESS"] || row["FULL_ADDRESS"] || row["Civic Address"] || getColumnData(row, ["ADDRESS", "SITE ADDRESS", "STREET ADDRESS"]);
                        const rawLat = row["LATITUDE"] || row["Y"] || getColumnData(row, ["LATITUDE", "LAT", "Y"]);
                        const rawLon = row["LONGITUDE"] || row["X"] || getColumnData(row, ["LONGITUDE", "LON", "X"]);

                        if (rawAddr && rawLat && rawLon) {
                            const lat = parseFloat(rawLat); const lon = parseFloat(rawLon);
                            if (isNaN(lat) || isNaN(lon)) continue;

                            const upperName = rawAddr.trim().toUpperCase();
                            const exists = await addressExists(upperName);
                            if (!exists) {
                                store.add({ name: upperName, lat: lat, lon: lon, type: "RESIDENTIAL" });
                                count++;
                            }
                        }
                    }
                },
                complete: function() {
                    speak(`Full residential database synced. ${count} core nodes integrated.`);
                    checkVaultCount();
                    document.getElementById('sync-status').innerText = `✅ FULL RESIDENTIAL: ${count} ADDED`;
                }
            });
        }

        async function loadNearbyAddresses(radiusKm = 30) {
            if (!userPos) { speak("GPS required for nearby load."); return; }
            speak(`Loading addresses within ${radiusKm} km radius.`);
            document.getElementById('sync-status').innerText = `📍 LOADING NEARBY (${radiusKm} km)...`;

            const RESIDENTIAL_URL = "https://data.edmonton.ca/api/views/ut27-nrpn/rows.csv?accessType=DOWNLOAD";
            let count = 0;

            Papa.parse(RESIDENTIAL_URL, {
                download: true, header: true, skipEmptyLines: true,
                chunk: async function(results) {
                    const tx = db.transaction("addresses", "readwrite");
                    const store = tx.objectStore("addresses");

                    for (let row of results.data) {
                        const rawAddr = row["ADDRESS"] || row["FULL_ADDRESS"] || row["Civic Address"] || getColumnData(row, ["ADDRESS", "SITE ADDRESS", "STREET ADDRESS"]);
                        const rawLat = row["LATITUDE"] || row["Y"] || getColumnData(row, ["LATITUDE", "LAT", "Y"]);
                        const rawLon = row["LONGITUDE"] || row["X"] || getColumnData(row, ["LONGITUDE", "LON", "X"]);

                        if (rawAddr && rawLat && rawLon) {
                            const lat = parseFloat(rawLat); const lon = parseFloat(rawLon);
                            if (isNaN(lat) || isNaN(lon)) continue;

                            const dist = calculateDistance(userPos.lat, userPos.lon, lat, lon);
                            if (dist <= radiusKm) {
                                const upperName = rawAddr.trim().toUpperCase();
                                const exists = await addressExists(upperName);
                                if (!exists) {
                                    store.add({ name: upperName, lat: lat, lon: lon, type: "RESIDENTIAL" });
                                    count++;
                                }
                            }
                        }
                    }
                },
                complete: function() {
                    speak(`Loaded ${count} new nearby addresses.`);
                    checkVaultCount();
                    document.getElementById('sync-status').innerText = `✅ NEARBY: ${count} ADDED`;
                }
            });
        }

        function clearVaultAndRetry() {
            if (confirm("Clear the entire vault and restart full residential sync?")) {
                const tx = db.transaction("addresses", "readwrite");
                tx.objectStore("addresses").clear().onsuccess = () => {
                    speak("Vault cleared. Restarting full residential sync.");
                    syncResidentialParcels();
                };
            }
        }

        function searchVault() {
            const query = document.getElementById('search-input').value.toUpperCase().trim();
            if (!query) return;

            const tx = db.transaction("addresses", "readonly");
            const index = tx.objectStore("addresses").index("name");
            document.getElementById('sync-status').innerText = "🔍 SCANNING VAULT...";

            index.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const node = cursor.value;
                    if (node.name.includes(query)) {
                        map.setView([node.lat, node.lon], 16);
                        
                        let markerColor = '#ff0055';
                        if (node.type === "GROCERY") markerColor = '#39ff14';
                        if (node.type === "PHARMACY") markerColor = '#00f3ff';
                        if (node.type === "SPECIALTY") markerColor = '#b500ff';
                        if (node.type === "FUEL") markerColor = '#ffff00';
                        if (node.type === "RESIDENTIAL") markerColor = '#b500ff';

                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker([node.lat, node.lon], {
                            radius: 11, color: markerColor, fillColor: markerColor, fillOpacity: 0.85, weight: 3
                        }).addTo(map).bindPopup(`
                            <div style="text-align:center; font-family: 'Courier New', monospace;">
                                <b style="color:${markerColor}">${node.name}</b><br>
                                <span style="font-size: 0.7rem; color: #888;">TYPE: ${node.type}</span><br><br>
                                <button onclick="lockRoute(${node.lat}, ${node.lon}, '${node.name.replace(/'/g, "\\'")}')">LOCK VECTOR</button>
                            </div>
                        `).openPopup();

                        speak(`${node.name} locked.`);
                        document.getElementById('sync-status').innerText = "✅ NODE LOCKED";
                        return;
                    }
                    cursor.continue();
                } else {
                    document.getElementById('sync-status').innerText = "❌ NOT IN VAULT";
                    speak("Vector not found in local vault.");
                }
            };
        }

        // ==================== GPS + ROUTING ====================
        function startGPS() {
            speak("Engaging GPS with real-time lane detection.");
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                if (!userMarker) {
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], { radius: 8, color: '#b500ff', fillColor: '#b500ff', fillOpacity: 0.9, weight: 3 }).addTo(map);
                    map.setView([userPos.lat, userPos.lon], 13);
                } else {
                    userMarker.setLatLng([userPos.lat, userPos.lon]);
                }
                if (routingControl) routingControl.route();
            }, null, { enableHighAccuracy: true, maximumAge: 1500 });
        }

        function lockRoute(lat, lon, name) {
            activeTarget = { lat, lon, name };
            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(userPos.lat, userPos.lon), L.latLng(lat, lon)],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'driving' }),
                routeWhileDragging: false, showAlternatives: false,
                lineOptions: { styles: [{ color: '#00f3ff', weight: 6, opacity: 0.85 }] },
                createMarker: () => null
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const route = e.routes[0];
                currentRouteSteps = route.instructions || [];
                speak(`Route locked to ${name}. Real-time lane guidance active.`);
                lastSpoken = {};
            });

            if (routeWatchId) navigator.geolocation.clearWatch(routeWatchId);
            
            routeWatchId = navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                if (!currentRouteSteps.length) return;
                const nextStep = currentRouteSteps[0];
                if (!nextStep) return;

                const distanceToTurn = nextStep.distance;
                const voiceTriggers = [
                    { threshold: 3000, message: `In 3 kilometers, ${nextStep.text}. Get in the ${nextStep.modifier || 'right'} lane.` },
                    { threshold: 1000, message: `In 1 kilometer, ${nextStep.text}.` },
                    { threshold: 500,  message: `In 500 meters, ${nextStep.text}.` },
                    { threshold: 300,  message: `In 300 meters, ${nextStep.text}.` },
                    { threshold: 150,  message: `In 150 meters, ${nextStep.text}.` },
                    { threshold: 10,   message: `${nextStep.text} NOW.` }
                ];

                for (let trigger of voiceTriggers) {
                    const key = `${nextStep.text}-${trigger.threshold}`;
                    if (distanceToTurn <= trigger.threshold && distanceToTurn > trigger.threshold - 25 && !lastSpoken[key]) {
                        speak(trigger.message);
                        document.getElementById('sync-status').innerText = trigger.message;
                        document.getElementById('lane-assist').style.display = 'block';
                        document.getElementById('recommended-lane').innerHTML = `<span style="color:#39ff14">${nextStep.modifier ? nextStep.modifier.toUpperCase() + ' LANE' : 'RIGHT LANE'}</span>`;
                        lastSpoken[key] = true;
                        break;
                    }
                }

                if (distanceToTurn < 8) {
                    currentRouteSteps.shift();
                    lastSpoken = {};
                    document.getElementById('lane-assist').style.display = 'none';
                }
            }, null, { enableHighAccuracy: true });
        }

        // ==================== COLLAPSIBLE WEATHER ====================
        function toggleWeatherPanel() {
            const content = document.getElementById('weather-content');
            const icon = document.getElementById('weather-toggle-icon');
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
            icon.textContent = content.style.display === 'none' ? '▼' : '▲';
        }

        async function fetchWeatherData() {
            if (!userPos) { speak("GPS required for weather."); return; }
            speak("Atmospheric scan initiated.");
            document.getElementById('sync-status').innerText = "☀️ METEO FETCH...";
            const lat = userPos.lat; const lon = userPos.lon;
            const forecastUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,precipitation_probability,weather_code&timezone=auto&forecast_days=1`;
            const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=pm10,pm2_5&timezone=auto`;
            
            try {
                const [fRes, aqiRes] = await Promise.all([fetch(forecastUrl), fetch(aqiUrl)]);
                const forecast = await fRes.json();
                const aqiData = await aqiRes.json();
                
                if(!forecast.current) throw new Error("Weather API Error");

                const now = forecast.current;
                const weatherDesc = {0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",95:"Thunderstorm"}[now.weather_code] || "Unknown";
                
                document.getElementById('weather-current').innerHTML = `
                    <span style="color:#ffff00;font-size:1.1rem;">${now.temperature_2m}°C (feels ${now.apparent_temperature}°C)</span><br>
                    ${weatherDesc} • Humidity ${now.relative_humidity_2m}%<br>
                    Precip: ${now.precipitation} mm • Wind ${now.wind_speed_10m} km/h @ ${now.wind_direction_10m}°
                `;
                
                const hourlyHTML = forecast.hourly.time.slice(0, 8).map((time, i) => {
                    const hour = new Date(time).getHours();
                    const temp = forecast.hourly.temperature_2m[i];
                    const prob = forecast.hourly.precipitation_probability[i];
                    return `<div class="hourly-item"><b>${hour}:00</b><br>${temp}°<br>${prob}% rain</div>`;
                }).join('');
                document.getElementById('hourly-grid').innerHTML = hourlyHTML;

                const pm25 = aqiData.hourly.pm2_5[0] || 0;
                const pm10 = aqiData.hourly.pm10[0] || 0;
                const aqiLevel = pm25 > 35 ? "UNHEALTHY" : pm25 > 15 ? "MODERATE" : "GOOD";
                document.getElementById('aqi-content').innerHTML = `
                    PM2.5: <span style="color:#ffff00">${pm25}</span> μg/m³<br>
                    PM10: <span style="color:#ffff00">${pm10}</span> μg/m³<br>
                    <span style="color:${aqiLevel === "GOOD" ? "#39ff14" : "#ffff00"}">${aqiLevel} AIR QUALITY</span>
                `;
                
                document.getElementById('weather-content').style.display = 'block';
                document.getElementById('weather-panel').style.display = 'flex';
                speak(`Temperature ${now.temperature_2m} degrees. ${weatherDesc}. Air quality ${aqiLevel.toLowerCase()}.`);
            } catch (err) {
                console.error(err);
                speak("Meteo link temporarily offline.");
            }
        }

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log("Artemis Shield: ACTIVE", reg.scope))
                    .catch(err => console.log("Artemis Shield: OFFLINE", err));
            });
        }

        window.onload = () => { console.log("Artemis Tactical // Omega 3.0 fully loaded."); };
    </script>
</body>
</html>
