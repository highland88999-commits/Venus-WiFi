<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ARtemis_NAV // OMEGA_3.0 ⚡</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f3ff">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0a14;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #b500ff;
            --neon-green: #39ff14;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--terminal-font);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1001; pointer-events: none;
        }

        header {
            background: #0d0d1a; border-bottom: 2px solid var(--neon-cyan);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan); z-index: 1002;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

        .nav-dash {
            display: flex; flex-direction: column; gap: 8px;
            padding: 10px 15px; background: #121225; border-bottom: 1px solid #2a2a4a; z-index: 1002;
        }

        .search-bar { display: flex; gap: 10px; }

        input[type="text"] {
            flex-grow: 1; background: #07070f; border: 1px solid var(--neon-cyan);
            color: #fff; padding: 10px; font-family: var(--terminal-font);
            box-shadow: inset 0 0 5px var(--neon-cyan);
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 8px; cursor: pointer; font-family: var(--terminal-font);
            text-transform: uppercase; font-weight: bold; transition: all 0.3s ease; font-size: 0.8rem;
            flex-grow: 1; text-align: center;
        }

        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        button.pink { color: var(--neon-pink); border-color: var(--neon-pink); }
        button.pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }
        button.purple { color: var(--neon-purple); border-color: var(--neon-purple); }
        button.purple:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }

        #progress-bar {
            height: 4px; background: var(--neon-pink); width: 0%;
            transition: width 0.3s; box-shadow: 0 0 10px var(--neon-pink); z-index: 1002;
        }

        #map { flex-grow: 1; z-index: 1000; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%); }

        .leaflet-popup-content-wrapper {
            background: #0d0d1a; color: #fff; border: 1px solid var(--neon-cyan);
            font-family: var(--terminal-font); box-shadow: 0 0 10px var(--neon-cyan);
        }
    </style>
</head>
<body>

    <header>
        <h1>[ARTEMIS] SYSTEM_CORE_v3</h1>
        <div id="sync-status" style="color: var(--neon-green); font-size: 0.8rem;">🛰️ STANDBY</div>
    </header>

    <div id="progress-bar"></div>

    <div class="nav-dash">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="SEARCH OFFLINE VAULT...">
            <button onclick="searchVault()">🔍 SCAN</button>
        </div>
        <div class="controls">
            <button class="pink" onclick="syncDropboxVault()">📡 DL DROPBOX VAULT</button>
            <button class="purple" onclick="syncWifiNodes()">📶 SCAN 20KM WIFI</button>
            <button onclick="startGPS()">🛰️ ENGAGE GPS</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([53.5461, -113.4937], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let db;
        let userMarker = null;
        let destMarker = null;
        let activeRouteLine = null;
        let rangeRing = null; 
        let activeTarget = null;
        let userPos = null;
        let wifiLayer = L.layerGroup().addTo(map);
        
        let alertsSpoken = { '3km': false, '1km': false, 'arrived': false };

        const wifiDatabase = [
            { n: "McDonald's Jasper Ave", brand: "McD", lat: 53.5415, lon: -113.4975, ssid: "McD_WiFi" },
            { n: "Starbucks City Centre", brand: "Coffee", lat: 53.5448, lon: -113.4912, ssid: "Starbucks WiFi" },
            { n: "Tim Hortons Hub", brand: "Timmies", lat: 53.5480, lon: -113.5000, ssid: "Tim_Hortons_WiFi" },
            { n: "Walmart South Common", brand: "Retail", lat: 53.4475, lon: -113.4792, ssid: "Walmart_WiFi" },
            { n: "Superstore Calgary Tr", brand: "Grocery", lat: 53.4882, lon: -113.4938, ssid: "PC_Guest" },
            { n: "TELUS Spark Hub", brand: "Telco", lat: 53.5450, lon: -113.4850, ssid: "#TELUS" },
            { n: "Rogers Place Node", brand: "Telco", lat: 53.5469, lon: -113.4972, ssid: "RogersOpen" }
        ];

        const request = indexedDB.open("ArtemisVault", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            const store = db.createObjectStore("addresses", { keyPath: "id", autoIncrement: true });
            store.createIndex("name", "name", { unique: false });
        };
        request.onsuccess = (e) => { db = e.target.result; checkVaultCount(); };

        function checkVaultCount() {
            const tx = db.transaction("addresses", "readonly");
            const countReq = tx.objectStore("addresses").count();
            countReq.onsuccess = () => {
                if(countReq.result > 0) document.getElementById('sync-status').innerText = `VAULT: ${countReq.result} NODES`;
            };
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0; utter.pitch = 0.8;
            window.speechSynthesis.speak(utter);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Helper to find column data regardless of capitalization or spacing
        function getColumnData(row, acceptableHeaders) {
            for (let key in row) {
                if (acceptableHeaders.includes(key.trim().toUpperCase())) {
                    return row[key];
                }
            }
            return null;
        }

        function syncDropboxVault() {
            const DROPBOX_URL = "https://dl.dropboxusercontent.com/scl/fi/nul502kd2byo9j55mjtw1/Parcel_Addresses_20260324.csv?rlkey=htmnkgk0x084o6zw3mj02xlqr&st=f1wbkq20&dl=1";
            speak("Initiating vault streaming.");
            document.getElementById('sync-status').innerText = "📡 STREAMING...";
            let count = 0;

            Papa.parse(DROPBOX_URL, {
                download: true, 
                header: true, 
                skipEmptyLines: true,
                chunk: function(results) {
                    const tx = db.transaction("addresses", "readwrite");
                    const store = tx.objectStore("addresses");

                    results.data.forEach(row => {
                        const rawName = getColumnData(row, ["ADDRESS", "FULL ADDRESS", "SITE_ADDRESS", "STREET_ADDRESS", "NAME", "LOCATION"]);
                        const rawLat = getColumnData(row, ["LATITUDE", "LAT", "Y", "POINT_Y"]);
                        const rawLon = getColumnData(row, ["LONGITUDE", "LON", "LONG", "X", "POINT_X"]);

                        if (rawName && rawLat && rawLon) {
                            store.add({ 
                                name: rawName.trim().toUpperCase(), 
                                lat: parseFloat(rawLat), 
                                lon: parseFloat(rawLon) 
                            });
                            count++;
                        }
                    });

                    if (count % 1000 === 0) {
                        document.getElementById('progress-bar').style.width = (count / 4200) + "%"; 
                    }
                },
                complete: function() {
                    speak("Vault synchronized.");
                    checkVaultCount();
                    document.getElementById('progress-bar').style.width = "100%";
                    setTimeout(() => document.getElementById('progress-bar').style.width = "0%", 2000);
                }
            });
        }

        function syncWifiNodes() {
            if (!userPos) { speak("GPS required for scan."); return; }
            wifiLayer.clearLayers();
            let count = 0;
            wifiDatabase.forEach(node => {
                const dist = calculateDistance(userPos.lat, userPos.lon, node.lat, node.lon);
                if (dist <= 20) {
                    L.circleMarker([node.lat, node.lon], {
                        radius: 7, color: '#00f3ff', fillColor: '#00f3ff', fillOpacity: 0.6, weight: 2
                    }).bindPopup(`<b>${node.n}</b><br>SSID: ${node.ssid}<br>${dist.toFixed(1)}km away<br><button onclick="lockRoute(${node.lat}, ${node.lon}, '${node.n}')">LOCK ROUTE</button>`)
                    .addTo(wifiLayer);
                    count++;
                }
            });
            speak(`${count} nodes within perimeter.`);
        }

        function searchVault() {
            const query = document.getElementById('search-input').value.toUpperCase();
            if (!query) return;
            const tx = db.transaction("addresses", "readonly");
            const index = tx.objectStore("addresses").index("name");
            index.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    if (cursor.value.name.toUpperCase().includes(query)) {
                        const match = cursor.value;
                        map.setView([match.lat, match.lon], 16);
                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker([match.lat, match.lon], {
                            radius: 9, color: '#ff0055', fillColor: '#ff0055', fillOpacity: 0.9, weight: 2
                        }).addTo(map).bindPopup(`<b>${match.name}</b><br><button onclick="lockRoute(${match.lat}, ${match.lon}, '${match.name}')">LOCK ROUTE</button>`).openPopup();
                        speak("Vector found.");
                        return;
                    }
                    cursor.continue();
                }
            };
        }

        function startGPS() {
            speak("Engaging GPS.");
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                if (!userMarker) {
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], {
                        radius: 8, color: '#b500ff', fillColor: '#b500ff', fillOpacity: 0.9, weight: 3
                    }).addTo(map);
                    rangeRing = L.circle([userPos.lat, userPos.lon], {
                        radius: 20000, color: '#00f3ff', weight: 1, fillOpacity: 0.03, dashArray: '10, 10'
                    }).addTo(map);
                    map.setView([userPos.lat, userPos.lon], 11);
                } else {
                    userMarker.setLatLng([userPos.lat, userPos.lon]);
                    rangeRing.setLatLng([userPos.lat, userPos.lon]);
                }
                updateNavigation();
            }, null, { enableHighAccuracy: true });
        }

        function lockRoute(lat, lon, name) {
            activeTarget = { lat, lon, name };
            alertsSpoken = { '3km': false, '1km': false, 'arrived': false };
            speak(`Locked on: ${name}.`);
            map.closePopup();
            updateNavigation();
        }

        function updateNavigation() {
            if (!userPos || !activeTarget) return;
            if (activeRouteLine) map.removeLayer(activeRouteLine);
            activeRouteLine = L.polyline([[userPos.lat, userPos.lon], [activeTarget.lat, activeTarget.lon]], { 
                color: '#00f3ff', weight: 4, opacity: 0.8, dashArray: '5, 10' 
            }).addTo(map);
            const dist = calculateDistance(userPos.lat, userPos.lon, activeTarget.lat, activeTarget.lon) * 1000;
            document.getElementById('sync-status').innerText = `DIST: ${dist.toFixed(0)}m`;
            if (dist <= 20 && !alertsSpoken['arrived']) {
                speak("Arrived at target node."); alertsSpoken['arrived'] = true;
                activeTarget = null;
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => { console.log("Artemis Shield: ACTIVE", reg.scope); })
                    .catch(err => { console.log("Artemis Shield: OFFLINE", err); });
            });
        }
    </script>
</body>
</html>
