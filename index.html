<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ARtemis_NAV // OMEGA_BUILD ⚡</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f3ff">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0a14;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #b500ff;
            --neon-green: #39ff14;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--terminal-font);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1001; pointer-events: none;
        }

        header {
            background: #0d0d1a; border-bottom: 2px solid var(--neon-cyan);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan); z-index: 1002;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

        .nav-dash {
            display: flex; flex-direction: column; gap: 8px;
            padding: 10px 15px; background: #121225; border-bottom: 1px solid #2a2a4a; z-index: 1002;
        }

        .search-bar { display: flex; gap: 10px; }

        input[type="text"] {
            flex-grow: 1; background: #07070f; border: 1px solid var(--neon-cyan);
            color: #fff; padding: 10px; font-family: var(--terminal-font);
            box-shadow: inset 0 0 5px var(--neon-cyan);
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 8px; cursor: pointer; font-family: var(--terminal-font);
            text-transform: uppercase; font-weight: bold; transition: all 0.3s ease; font-size: 0.8rem;
            flex-grow: 1; text-align: center;
        }

        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        button.pink { color: var(--neon-pink); border-color: var(--neon-pink); }
        button.pink:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }
        button.purple { color: var(--neon-purple); border-color: var(--neon-purple); }
        button.purple:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }

        #progress-bar {
            height: 4px; background: var(--neon-pink); width: 0%;
            transition: width 0.3s; box-shadow: 0 0 10px var(--neon-pink); z-index: 1002;
        }

        #map { flex-grow: 1; z-index: 1000; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%); }

        .leaflet-popup-content-wrapper {
            background: #0d0d1a; color: #fff; border: 1px solid var(--neon-cyan);
            font-family: var(--terminal-font); box-shadow: 0 0 10px var(--neon-cyan);
        }
    </style>
</head>
<body>

    <header>
        <h1>[ARTEMIS] SYSTEM_CORE</h1>
        <div id="sync-status" style="color: var(--neon-green); font-size: 0.8rem;">🛰️ STANDBY</div>
    </header>

    <div id="progress-bar"></div>

    <div class="nav-dash">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="SEARCH OFFLINE VAULT...">
            <button onclick="searchVault()">🔍 SCAN</button>
        </div>
        <div class="controls">
            <button class="pink" onclick="syncDropboxVault()">📡 DL DROPBOX VAULT</button>
            <button class="purple" onclick="syncWifiNodes()">📶 SYNC WIFI NODES</button>
            <button onclick="startGPS()">🛰️ ENGAGE GPS</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // --- MAP INITIALIZATION ---
        const map = L.map('map').setView([53.5461, -113.4937], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- GLOBAL VARIABLES ---
        let db;
        let userMarker = null;       // Purple
        let destMarker = null;       // Red
        let activeRouteLine = null;  // Cyan Auto-Adjusting Line
        let activeTarget = null;
        let userPos = null;
        let wifiLayer = L.layerGroup().addTo(map); // Holds all blue markers
        
        // Voice Alert Flags
        let alertsSpoken = { '3km': false, '1km': false, '500ft': false, '100ft': false, 'arrived': false };

        // --- HARDCODED WIFI DATABASE ---
        const yegWifiDatabase = [
            { n: "EPL Stanley Milner", lat: 53.5435, lon: -113.4895, s: "EPL-Free-Wifi" },
            { n: "City Hall Hub", lat: 53.5453, lon: -113.4901, s: "Open City Wi-Fi" },
            { n: "McDonald's Jasper Ave", lat: 53.5415, lon: -113.4975, s: "BELLWIFI@MCD" },
            { n: "Southgate Shopping Hub", lat: 53.4851, lon: -113.5144, s: "#TELUS" },
            { n: "Walmart South Common", lat: 53.4475, lon: -113.4792, s: "Walmart_WiFi" },
            { n: "West Edmonton Mall", lat: 53.5225, lon: -113.6242, s: "WEM-Guest" },
            // Add your 102 Sandbox locations here later!
        ];

        // --- 1. VAULT INITIALIZATION (IndexedDB) ---
        const request = indexedDB.open("ArtemisVault", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            const store = db.createObjectStore("addresses", { keyPath: "id", autoIncrement: true });
            store.createIndex("name", "name", { unique: false });
        };
        request.onsuccess = (e) => { db = e.target.result; checkVaultCount(); };

        function checkVaultCount() {
            const tx = db.transaction("addresses", "readonly");
            const countReq = tx.objectStore("addresses").count();
            countReq.onsuccess = () => {
                if(countReq.result > 0) {
                    document.getElementById('sync-status').innerText = `VAULT: ${countReq.result} NODES`;
                }
            };
        }

        // --- SYSTEM VOICE ---
        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0; utter.pitch = 0.8;
            window.speechSynthesis.speak(utter);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- 2. THE DROPBOX SYNC (Addresses) ---
        function syncDropboxVault() {
            const DROPBOX_URL = "https://dl.dropboxusercontent.com/scl/fi/nul502kd2byo9j55mjtw1/Parcel_Addresses_20260324.csv?rlkey=htmnkgk0x084o6zw3mj02xlqr&st=f1wbkq20&dl=1";
            
            speak("Initiating high-speed data stream.");
            document.getElementById('sync-status').innerText = "📡 STREAMING...";

            let count = 0;
            const tx = db.transaction("addresses", "readwrite");
            const store = tx.objectStore("addresses");

            Papa.parse(DROPBOX_URL, {
                download: true, header: true, skipEmptyLines: true,
                step: function(results) {
                    const row = results.data;
                    const name = row.Address || row.Name || row.ADDRESS || row.NAME;
                    const lat = parseFloat(row.Latitude || row.LATITUDE);
                    const lon = parseFloat(row.Longitude || row.LONGITUDE);

                    if (name && lat && lon) {
                        store.add({ name: name, lat: lat, lon: lon });
                        count++;
                        if (count % 1000 === 0) {
                            document.getElementById('progress-bar').style.width = (count / 4000) + "%"; 
                        }
                    }
                },
                complete: function() {
                    speak("Vault initialized. Offline tracking ready.");
                    checkVaultCount();
                    document.getElementById('progress-bar').style.width = "100%";
                    setTimeout(() => document.getElementById('progress-bar').style.width = "0%", 2000);
                }
            });
        }

        // --- 3. SYNC WIFI NODES (Blue Markers) ---
        function syncWifiNodes() {
            wifiLayer.clearLayers(); // Clear old ones to prevent duplicates
            
            yegWifiDatabase.forEach(node => {
                // BLUE CIRCLE MARKERS FOR WIFI
                const marker = L.circleMarker([node.lat, node.lon], {
                    radius: 7, color: '#00f3ff', fillColor: '#00f3ff', fillOpacity: 0.6, weight: 2
                }).bindPopup(`<b>${node.n}</b><br>SSID: ${node.s}<br><button onclick="lockRoute(${node.lat}, ${node.lon}, '${node.n}')">LOCK ROUTE</button>`);
                
                wifiLayer.addLayer(marker);
            });
            speak("Wifi tactical nodes plotted on grid.");
        }

        // --- 4. THE VAULT SEARCH ---
        function searchVault() {
            const query = document.getElementById('search-input').value.toUpperCase();
            if (!query) return;

            const tx = db.transaction("addresses", "readonly");
            const index = tx.objectStore("addresses").index("name");
            
            document.getElementById('sync-status').innerText = "🔍 SCANNING...";

            let found = false;
            index.openCursor().onsuccess = (event) => {
                const cursor = event.target.result;
                if (cursor) {
                    if (cursor.value.name.toUpperCase().includes(query)) {
                        const match = cursor.value;
                        found = true;
                        
                        map.setView([match.lat, match.lon], 16);
                        
                        // RED CIRCLE MARKER FOR DESTINATION
                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker([match.lat, match.lon], {
                            radius: 9, color: '#ff0055', fillColor: '#ff0055', fillOpacity: 0.9, weight: 2
                        }).addTo(map)
                        .bindPopup(`<b>${match.name}</b><br><button onclick="lockRoute(${match.lat}, ${match.lon}, '${match.name}')">LOCK ROUTE</button>`)
                        .openPopup();

                        document.getElementById('sync-status').innerText = "✅ NODE FOUND";
                        speak("Location verified.");
                        return; // Stop at first match
                    }
                    cursor.continue();
                } else if (!found) {
                    speak("No sector matches found in offline vault.");
                    document.getElementById('sync-status').innerText = "❌ NO MATCH";
                }
            };
        }

        // --- 5. GPS & NAVIGATION (Auto-Adjusting) ---
        function lockRoute(lat, lon, name) {
            activeTarget = { lat, lon, name };
            alertsSpoken = { '3km': false, '1km': false, '500ft': false, '100ft': false, 'arrived': false };
            speak(`Target Locked: ${name}. Tactical line active.`);
            map.closePopup();
            updateNavigation(); // Initial draw if GPS is already on
        }

        function startGPS() {
            speak("GPS active. Tracking purple signature.");
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                
                if (!userMarker) {
                    // PURPLE CIRCLE MARKER FOR USER
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], {
                        radius: 8, color: '#b500ff', fillColor: '#b500ff', fillOpacity: 0.9, weight: 3
                    }).addTo(map).bindPopup("YOU (CYBER_USER)");
                    map.setView([userPos.lat, userPos.lon], 15);
                } else {
                    userMarker.setLatLng([userPos.lat, userPos.lon]);
                }
                
                updateNavigation(); // Auto-adjusts the vector line every time GPS moves
            }, err => alert("GPS Jammed."), { enableHighAccuracy: true });
        }

        function updateNavigation() {
            if (!userPos || !activeTarget) return;

            // DRAW/UPDATE NEON CYAN VECTOR LINE
            // Because this clears and redraws from the user's current spot, it inherently auto-adjusts if you turn!
            if (activeRouteLine) map.removeLayer(activeRouteLine);
            activeRouteLine = L.polyline([
                [userPos.lat, userPos.lon], 
                [activeTarget.lat, activeTarget.lon]
            ], { color: '#00f3ff', weight: 4, opacity: 0.8, dashArray: '5, 10' }).addTo(map);

            const distanceMeters = getDistance(userPos.lat, userPos.lon, activeTarget.lat, activeTarget.lon);
            const distanceFeet = distanceMeters * 3.28084;

            document.getElementById('sync-status').innerText = `TARGET: ${distanceMeters.toFixed(0)}m away`;

            // VOICE ALERTS
            if (distanceMeters <= 3000 && distanceMeters > 1000 && !alertsSpoken['3km']) {
                speak("Three kilometers to destination."); alertsSpoken['3km'] = true;
            } 
            else if (distanceMeters <= 1000 && distanceMeters > 152 && !alertsSpoken['1km']) {
                speak("One kilometer warning."); alertsSpoken['1km'] = true;
            } 
            else if (distanceFeet <= 500 && distanceFeet > 100 && !alertsSpoken['500ft']) {
                speak("Five hundred feet warning."); alertsSpoken['500ft'] = true;
            } 
            else if (distanceFeet <= 100 && distanceFeet > 20 && !alertsSpoken['100ft']) {
                speak("One hundred feet warning."); alertsSpoken['100ft'] = true;
            } 
            else if (distanceMeters <= 20 && !alertsSpoken['arrived']) {
                speak("Destination reached."); alertsSpoken['arrived'] = true;
                if (activeRouteLine) map.removeLayer(activeRouteLine);
                activeTarget = null;
            }
        }
    </script>
</body>
</html>
